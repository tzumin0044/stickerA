<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大買家組合貼紙列印系統</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
            --sticker-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 捲軸樣式優化 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
            transition: background 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .header-title h1 {
            font-size: 1.2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: grid;
            grid-template-columns: 320px 420px 1fr;
            /* 增加中間清單寬度，提供更多空間顯示完整資訊 */
            gap: 1.5rem;
            padding: 1rem;
            height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #818cf8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 0.6rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }

        select,
        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            outline: none;
        }

        select:focus,
        input:focus {
            border-color: var(--primary);
        }

        .btn {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: none;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            font-size: 0.85rem;
        }

        .btn-success {
            background: var(--accent);
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Product List */
        .product-list-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-box {
            margin-bottom: 0.8rem;
        }

        .product-list-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
            background: #1e293b;
            border: 1px solid #334155;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .product-list {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
        }

        .product-row {
            display: grid;
            grid-template-columns: 30px 100px 1fr 45px;
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            align-items: center;
            gap: 8px;
        }

        .fav-star {
            color: #475569;
            font-size: 1.1rem;
            transition: all 0.2s;
            text-align: center;
        }

        .fav-star.active {
            color: #f59e0b;
            text-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
        }

        .fav-star:hover {
            transform: scale(1.2);
        }

        .product-row:hover {
            background: rgba(79, 70, 229, 0.1);
            transform: translateX(4px);
        }

        .product-row .p-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #818cf8;
            background: rgba(129, 140, 248, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .product-row .p-name {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.3;
            word-break: break-all;
            white-space: normal;
        }

        .product-row .p-unit {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: right;
            background: #1e293b;
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* Staging Area */
        .staging-area {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #cards-container {
            flex-grow: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding: 1rem 0.5rem 2rem 0.5rem;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
            align-content: start;
        }

        .sticker-card {
            background: #1e293b;
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px;
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: fit-content;
            min-height: 280px;
        }

        .sticker-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .sticker-card.active {
            border-color: var(--primary);
            background: linear-gradient(145deg, #1e293b 0%, #161e2e 100%);
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.2);
        }

        .sticker-card .card-header {
            color: #f8fafc;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sticker-card .card-item-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 10px 0;
            transition: background 0.2s;
        }

        .sticker-card .card-item-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .sticker-card .card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 15px;
            color: #818cf8;
            font-size: 0.95rem;
            text-align: right;
            font-weight: 500;
        }

        .sticker-card .card-controls {
            position: absolute;
            top: -10px;
            right: 0;
            display: flex;
            gap: 5px;
            z-index: 50;
        }

        .small-circle-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            color: white;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid black;
            padding-bottom: 5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .card-items-list {
            flex-grow: 1;
        }

        .card-item-row {
            display: grid;
            grid-template-columns: 1fr 60px 45px 30px;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            font-weight: 400;
        }

        .card-item-row:last-child {
            border-bottom: none;
        }

        .card-item-row input {
            background: #0f172a;
            color: var(--accent) !important;
            border: 1px solid #334155;
            padding: 4px 6px;
            text-align: right;
            width: 60px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 6px;
            transition: all 0.2s;
            outline: none;
        }

        .card-item-row input:focus {
            border-color: var(--primary);
            background: #1e293b;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.3);
        }

        .card-item-row input.qty-zero {
            opacity: 0.3;
            background: #e2e8f0;
        }

        .item-del {
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1;
        }

        .card-footer {
            font-size: 0.9rem;
            border-top: none;
            padding-top: 5px;
            margin-top: 5px;
            text-align: center;
            font-weight: bold;
        }

        .staging-footer {
            border-top: 1px solid #334155;
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        @media print {

            header,
            .container {
                display: none !important;
            }

            #print-container {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 84.9mm;
                height: auto;
            }

            @page {
                size: 84.9mm 62.4mm;
                margin: 0;
            }

            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white;
            }

            .sticker {
                display: flex;
                flex-direction: column;
                width: 84.9mm;
                height: 62.4mm;
                padding: 2mm 4mm;
                box-sizing: border-box;
                page-break-after: always;
                background: white;
                color: black;
                border: 2px solid black;
                overflow: hidden;
            }

            .sticker:not(:last-child) {
                break-after: page;
                page-break-after: always;
            }

            .sticker-header {
                font-size: 1.3rem;
                font-weight: bold;
                border-bottom: 2px solid black;
                padding-bottom: 5px;
                margin-bottom: 8px;
                text-align: center;
            }

            .sticker-header {
                height: 15%;
                font-weight: bold;
                border-bottom: 2.5px solid black;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
                padding: 0;
            }

            .sticker-items-list {
                height: 70%;
                display: flex;
                flex-direction: column;
                justify-content: stretch;
                overflow: hidden;
                width: 100%;
            }

            .sticker-item-row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) 45px 35px;
                /* 縮小數量與單位寬度，增加品名空間 */
                align-items: center;
                gap: 2px;
                line-height: 1.5;
                padding: 0;
                border-bottom: 1px solid #000;
                width: 100%;
            }

            .sticker-item-row:last-child {
                border-bottom: none;
            }

            .sticker-item-row .p-name-cell {
                white-space: nowrap;
                overflow: hidden;
                /* 將由 JS 動態調整字體大小，故先不使用 ellipsis */
            }

            .sticker-footer {
                height: 15%;
                border-top: none;
                text-align: center;
                font-weight: bold;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-title">
            <h1>外箱貼列印系統 (84.9x62.4mm)</h1>
        </div>
        <div class="header-actions" style="display: flex; gap: 1rem; width: 550px;">
            <button class="btn btn-danger" onclick="clearAllCards()">🗑️ 清除全部</button>
            <button class="btn btn-primary" onclick="addNewCard()">➕ 新增貼紙</button>
            <button class="btn btn-success" style="font-size:1.1rem; font-weight: bold;" onclick="prepareAndPrint()">🖨️
                執行列印</button>
        </div>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="section">
                <div class="section-title">📍 基本設定</div>
                <div class="form-group">
                    <label>店別</label>
                    <select id="select-location" onchange="onLocationChange()">
                        <option value="大買家(國光店)">大買家(國光店)</option>
                        <option value="大買家(北屯店)">大買家(北屯店)</option>
                        <option value="大盤大(朴子店)">大盤大(朴子店)</option>
                        <option value="大盤大(北斗店)">大盤大(北斗店)</option>
                        <option value="商田">商田</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>到貨日期</label>
                    <input type="date" id="input-date" onchange="renderCards()">
                </div>
            </div>

            <div class="section" style="border-top: 1px solid #334155; padding-top: 1rem;">
                <div class="section-title">➕ 新增自定義品項</div>
                <input type="text" id="new-item-code" placeholder="品號 (選填)..." style="margin-bottom:0.5rem">
                <input type="text" id="new-item-name" placeholder="名稱..." style="margin-bottom:0.5rem">
                <select id="new-item-unit" style="margin-bottom:0.5rem">
                    <option value="盒">盒</option>
                    <option value="包">包</option>
                    <option value="袋">袋</option>
                    <option value="條">條</option>
                    <option value="支">支</option>
                    <option value="件">件</option>
                </select>
                <button class="btn btn-success" onclick="addNewProduct()">確認新增</button>
            </div>
        </div>

        <div class="product-list-container">
            <div class="section-title">📦 品項清單 (搜尋品號或名稱)</div>
            <div class="product-list-tabs">
                <button class="tab-btn active" id="tab-all" onclick="setProductFilter('all')">顯示全部</button>
                <button class="tab-btn" id="tab-fav" onclick="setProductFilter('fav')">⭐ 我的常用</button>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 搜尋品號/品名..." oninput="renderProductsList()">
            </div>
            <div class="product-list" id="product-list"></div>
        </div>

        <div class="staging-area">
            <div class="section-title">📝 清單顯示</div>
            <div id="cards-container"></div>
        </div>
    </div>

    <div id="print-container"></div>

    <script>
        const initialProducts = [
            { code: "A01000115", name: "香菇條碼(400g/盒)", unit: "盒", store: "大買家" },
            { code: "A010C0201", name: "履歷香菇(150g/盒)", unit: "盒", store: "" },
            { code: "A010D0101", name: "小香菇(300g/包)", unit: "包", store: "大買家" },
            { code: "A010D0101", name: "香菇〔小小〕(500g/包)", unit: "包", store: "大盤大" },
            { code: "A02000301", name: "有機杏鮑菇(180g/盒)", unit: "盒", store: "" },
            { code: "A0201B101", name: "杏鮑菇A(600g/包)", unit: "包", store: "大買家" },
            { code: "A020A0101", name: "杏鮑菇A(kg)", unit: "kg", store: "大盤大" },
            { code: "A020A0301", name: "有機杏鮑菇A(300g/盒)", unit: "盒", store: "" },
            { code: "A020B0101", name: "杏鮑菇B(3kg/包)", unit: "包", store: "大盤大" },
            { code: "A020C0102", name: "杏鮑菇C(600g/包)", unit: "包", store: "大買家" },
            { code: "A020D0101", name: "杏鮑菇D(1KG/包)", unit: "包", store: "大買家" },
            { code: "A03000301", name: "有機木耳(200g/盒)", unit: "盒", store: "" },
            { code: "A04000301", name: "有機銀耳〔盒裝〕(150g/盒)", unit: "盒", store: "" },
            { code: "A04000304", name: "有機銀耳(150g/袋)", unit: "袋", store: "大買家" },
            { code: "A05000301", name: "有機真空金針菇(200g/包)", unit: "包", store: "" },
            { code: "A06000304", name: "好菇道有機鴻喜菇(包)", unit: "包", store: "" },
            { code: "A060B0101", name: "鴻喜菇B(3kg/包)", unit: "包", store: "大盤大" },
            { code: "A07000302", name: "好菇道有機雪白菇(包)", unit: "包", store: "" },
            { code: "A070B0101", name: "雪白菇B(3kg/包)", unit: "包", store: "大盤大" },
            { code: "A08000302", name: "有機雙響菇(150g/盒)", unit: "盒", store: "" },
            { code: "A09000301", name: "有機秀珍菇(150g/盒)", unit: "盒", store: "" },
            { code: "A100B0101", name: "洋菇(200g/盒)", unit: "盒", store: "" },
            { code: "A110A0303", name: "有機黑蠔菇(150g/盒)", unit: "盒", store: "" },
            { code: "A120A0101", name: "白精靈A(200g/包)", unit: "包", store: "" },
            { code: "A160A0301", name: "有機柳松菇(150g/包)", unit: "包", store: "" },
            { code: "A250B0101", name: "乾香菇(大中)(250g/包)", unit: "包", store: "大買家" },
            { code: "A250D0101", name: "乾香菇(小鈕)(80g/包)", unit: "包", store: "大買家" },
            { code: "A290A0301", name: "有機韓小菇A(150g/盒)", unit: "盒", store: "" },
            { code: "G02000201", name: "履歷水果彩椒(160g/盒)", unit: "盒", store: "大盤大" },
            { code: "L030D0101", name: "真空日本山藥〔L〕(條)", unit: "條", store: "大買家" },
            { code: "Q02000201", name: "鮮切履歷芋頭(200g/包)", unit: "包", store: "" },
            { code: "Q03000301", name: "鮮切有機甜菜根(200g/包)", unit: "包", store: "" },
            { code: "Q05000201", name: "鮮切履歷蓮藕(150g/包)", unit: "包", store: "" },
            { code: "Q06000301", name: "鮮切有機人蔘山藥(300g/包)", unit: "包", store: "" },
            { code: "R03000101", name: "特級冬菇(20g/包)", unit: "包", store: "大買家" },
            { code: "R07000101", name: "手剝鮮蒜仁(120g/包)", unit: "包", store: "" },
            { code: "R09000301", name: "有機酸菜(400g/包)", unit: "包", store: "" },
            { code: "R12000301", name: "有機酸白菜(400g/包)", unit: "包", store: "" },
            { code: "", name: "蘿美(400g/包)", unit: "包", store: "" },
            { code: "", name: "美生菜(300g/包)", unit: "包", store: "" },
            { code: "", name: "櫛瓜M", unit: "支", store: "" },
            { code: "", name: "日本紅春香地瓜S(5kg/件)", unit: "件", store: "" }
        ];

        let products = [...initialProducts];
        let favorites = JSON.parse(localStorage.getItem('sticker-favorites') || '[]');
        let cards = [{ id: Date.now(), items: [] }];
        let activeCardId = cards[0].id;
        let currentFilter = 'all';
        let previousLocation = "大買家(國光店)";

        window.onload = () => {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('input-date').value = tomorrow.toISOString().split('T')[0];
            previousLocation = document.getElementById('select-location').value;
            renderProductsList();
            renderCards();
        };

        function getGroup(loc) {
            if (loc.startsWith("大買家")) return "大買家";
            if (loc.startsWith("大盤大")) return "大盤大";
            return loc;
        }

        function onLocationChange() {
            const newLocation = document.getElementById('select-location').value;
            const oldGroup = getGroup(previousLocation);
            const newGroup = getGroup(newLocation);

            if (oldGroup !== newGroup) {
                // 跨體系切換，自動清空
                cards = [{ id: Date.now(), items: [] }];
                activeCardId = cards[0].id;
            }

            previousLocation = newLocation;
            renderCards();
            renderProductsList();
        }

        function setProductFilter(filter) {
            currentFilter = filter;
            document.getElementById('tab-all').className = `tab-btn ${filter === 'all' ? 'active' : ''}`;
            document.getElementById('tab-fav').className = `tab-btn ${filter === 'fav' ? 'active' : ''}`;
            renderProductsList();
        }

        function toggleFavorite(code, name, event) {
            event.stopPropagation();
            const key = code || name;
            const index = favorites.indexOf(key);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(key);
            }
            localStorage.setItem('sticker-favorites', JSON.stringify(favorites));
            renderProductsList();
        }

        function renderProductsList() {
            const list = document.getElementById('product-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            const currentLocation = document.getElementById('select-location').value;
            list.innerHTML = '';

            let filtered = products.filter(p => p.name.toLowerCase().includes(search) || (p.code && p.code.toLowerCase().includes(search)));

            // 店別連動過濾：若品項有指定店別，則必須符合目前選擇店別的開頭 (如 "大買家", "大盤大")
            filtered = filtered.filter(p => {
                if (!p.store) return true;
                return currentLocation.startsWith(p.store);
            });

            if (currentFilter === 'fav') {
                filtered = filtered.filter(p => favorites.includes(p.code || p.name));
            }

            filtered.forEach(p => {
                const isFav = favorites.includes(p.code || p.name);
                const row = document.createElement('div');
                row.className = `product-row`;
                row.innerHTML = `
                    <div class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFavorite('${p.code}', '${p.name}', event)">${isFav ? '★' : '☆'}</div>
                    <div class="p-code">${p.code || '---'}</div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-unit">${p.unit}</div>
                `;
                row.onclick = () => addItemToActiveCard(p);
                list.appendChild(row);
            });
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            const location = document.getElementById('select-location').value;
            const date = document.getElementById('input-date').value.replace(/-/g, '/');
            container.innerHTML = '';

            cards.forEach((card, idx) => {
                const cardEl = document.createElement('div');
                cardEl.className = `sticker-card ${card.id === activeCardId ? 'active' : ''}`;
                cardEl.onclick = () => { activeCardId = card.id; renderCards(); };

                // 依據用戶要求，清單顯示內容固定為 12pt，並採用單行緊湊間距
                let count = card.items.length;
                let titleSize = count <= 3 ? "1.3rem" : "1.1rem";
                let itemSize = "12pt";
                let itemPad = "2px 0";
                let itemLineHeight = "2";

                let itemsHtml = card.items.map((item, idx) => `
                    <div class="card-item-row" style="padding: ${itemPad}; line-height: ${itemLineHeight}; border-bottom: 1px solid #eee;" onclick="event.stopPropagation()">
                        <span class="auto-scale" style="font-size: 20pt; white-space: nowrap; overflow: hidden; display: block; padding-right: 1cm;">${item.name}</span>
                        <input type="number" value="${item.qty}" min="0" 
                            style="font-size: 12pt; width: 60px; margin: 0 5px;"
                            class="${(item.qty === '0' || item.qty === 0 || item.qty === '') ? 'qty-zero' : ''}"
                            onclick="event.stopPropagation()"
                            onfocus="this.select()"
                            onkeydown="if(event.key==='Enter'){ const next = this.closest('.card-item-row').nextElementSibling?.querySelector('input'); if(next) next.focus(); else addNewProduct(); }"
                            oninput="this.value = this.value.replace(/^0+(?=\d)/, ''); updateItemQty(${card.id}, ${item.instanceId}, this.value); this.className = ((this.value === '0' || this.value === 0 || this.value === '') ? 'qty-zero' : '');">
                        <span style="font-size: 12pt; text-align:left">${item.unit}</span>
                        <span class="item-del" style="font-size: 14pt;" onclick="removeItem(${card.id}, ${item.instanceId}, event)">×</span>
                    </div>
                `).join('');

                cardEl.innerHTML = `
                    <div class="card-controls">
                        <button class="small-circle-btn btn-danger" onclick="removeCard(${card.id}, event)" title="移除此清單">×</button>
                    </div>
                    <div class="card-header">
                        <span><span style="color:var(--accent)">#${idx + 1}</span> ${location}</span>
                        <span style="background: var(--primary); font-size: 0.75rem; padding: 2px 8px; border-radius: 20px;">${card.items.length} 品項</span>
                    </div>
                    <div class="card-items-list" style="overflow-y:auto">${itemsHtml || '<div style="color:#94a3b8; text-align:center; margin: 30px 0; font-size: 0.9rem;">✨ 請由左側品項清單點選加入</div>'}</div>
                    <div class="card-footer">到貨日期：${date}</div>
                `;
                container.appendChild(cardEl);
            });
            autoScaleFont('.auto-scale');
        }

        function addItemToActiveCard(product) {
            const card = cards.find(c => c.id === activeCardId);
            if (card) {
                // 檢查是否已存在相同品項 (依品號或品名判斷)
                const exists = card.items.some(item => (item.code && item.code === product.code) || item.name === product.name);
                if (exists) {
                    return alert("此品項已在貼紙組合中！");
                }
                if (card.items.length >= 6) {
                    return alert("每張貼紙最多只能加入 6 筆品項！");
                }
                card.items.push({ ...product, instanceId: Date.now() + Math.random(), qty: "" });
                renderCards();
            }
        }

        function updateItemQty(cardId, instanceId, val) {
            const card = cards.find(c => c.id === cardId);
            if (card) {
                const item = card.items.find(i => i.instanceId === instanceId);
                if (item) item.qty = val;
            }
        }

        function removeItem(cardId, instanceId, event) {
            event.stopPropagation();
            const card = cards.find(c => c.id === cardId);
            if (card) {
                card.items = card.items.filter(i => i.instanceId !== instanceId);
                renderCards();
            }
        }

        function addNewCard() {
            const newId = Date.now();
            cards.push({ id: newId, items: [] });
            activeCardId = newId;
            renderCards();
        }

        function removeCard(cardId, event) {
            event.stopPropagation();
            cards = cards.filter(c => c.id !== cardId);
            if (cards.length === 0) {
                cards.push({ id: Date.now(), items: [] });
            }
            if (activeCardId === cardId || !cards.find(c => c.id === activeCardId)) {
                activeCardId = cards[0].id;
            }
            renderCards();
        }

        function addNewProduct() {
            const code = document.getElementById('new-item-code').value;
            const name = document.getElementById('new-item-name').value;
            const unit = document.getElementById('new-item-unit').value;
            if (!name) return alert("請輸入名稱");
            products.unshift({ code, name, unit });
            document.getElementById('new-item-code').value = '';
            document.getElementById('new-item-name').value = '';
            renderProductsList();
        }

        function clearAllCards() {
            if (confirm("確定要清除所有貼紙清單嗎？這將會移除目前所有的卡片與內容。")) {
                cards = [{ id: Date.now(), items: [] }];
                activeCardId = cards[0].id;
                renderCards();
            }
        }

        function prepareAndPrint() {
            const location = document.getElementById('select-location').value;
            const date = document.getElementById('input-date').value.replace(/-/g, '/');
            const container = document.getElementById('print-container');
            container.innerHTML = '';
            cards.forEach((card) => {
                if (card.items.length === 0) return;
                const sticker = document.createElement('div');
                sticker.className = 'sticker';

                // 固定為 6 項平均分配的字體設定
                let titleFontSize = "18pt";
                let itemFontSize = "12pt"; // 再縮小 5%

                // 準備 6 行資料，不足補空列
                let displayItems = [...card.items];
                if (displayItems.length > 6) {
                    displayItems = displayItems.slice(0, 6);
                }
                while (displayItems.length < 6) {
                    displayItems.push({ name: "&nbsp;", qty: "&nbsp;", unit: "&nbsp;" });
                }

                let itemsHtml = displayItems.map((item, idx) => {
                    const isReal = idx < card.items.length;
                    // 僅針對有品項的列顯示底線，填充的空列不顯示
                    const borderStyle = isReal ? "" : "border-bottom: none;";
                    return `
                    <div class="sticker-item-row" style="font-size: ${itemFontSize}; ${borderStyle}">
                        <div class="p-name-cell">${isReal ? item.name : '&nbsp;'}</div>
                        <div style="text-align:right; padding-right: 5px;">${isReal ? String(item.qty).replace(/^0+(?=\d)/, '') : '&nbsp;'}</div>
                        <div style="text-align:left">${isReal ? item.unit : '&nbsp;'}</div>
                    </div>
                    `;
                }).join('');

                sticker.innerHTML = `
                    <div class="sticker-header" style="font-size: ${titleFontSize}">${location}</div>
                    <div class="sticker-items-list">${itemsHtml}</div>
                    <div class="sticker-footer" style="font-size: ${titleFontSize}">到貨日期：${date}</div>
                `;
                container.appendChild(sticker);
            });
            autoScaleFont('.p-name-cell');
            if (container.innerHTML === '') return alert("沒有內容可列印");
            window.print();
        }
        function autoScaleFont(selector) {
            const elements = document.querySelectorAll(selector);
            elements.forEach(el => {
                el.style.fontSize = ''; // 先重置回原大小再測量
                let size = parseFloat(window.getComputedStyle(el).fontSize);
                const minSize = 8;
                while (el.scrollWidth > (el.offsetWidth + 1) && size > minSize) {
                    size -= 0.5;
                    el.style.fontSize = size + (selector.includes('sticker') || selector.includes('p-name') ? 'pt' : 'px');
                }
            });
        }
    </script>
</body>

</html>
